name: traffic_rennes

services:
  zookeeper:
    container_name: zookeeper
    image: confluentinc/cp-zookeeper:7.4.0
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    healthcheck:
      test: ["CMD-SHELL", "timeout 2 bash -c '</dev/tcp/localhost/2181' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 8
      start_period: 30s
    networks:
      - traffic_rennes_net

  kafka:
    container_name: kafka
    image: confluentinc/cp-kafka:7.4.0
    restart: unless-stopped
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:29092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,PLAINTEXT_HOST://localhost:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUMBER_OF_PARTITIONS: 3
    ports:
      - "9092:9092"
      - "29092:29092"
    volumes:
      - kafka-data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s
    networks:
      - traffic_rennes_net

  kafdrop:
    container_name: kafdrop
    image: obsidiandynamics/kafdrop:4.2.0
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKERCONNECT: kafka:9092
    ports:
      - "19000:9000"
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000 || exit 1"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - traffic_rennes_net

  spark-master:
    container_name: spark-master
    image: apache/spark:3.5.0
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.master.Master"]
    environment:
      - SPARK_MODE=master
      - SPARK_LOCAL_IP=spark-master
      - SPARK_MASTER_HOST=spark-master
      - SPARK_MASTER_OPTS=-Dspark.ui.bindAddress=0.0.0.0
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - ./datalake:/opt/spark/datalake
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket,sys; s=socket.socket(); s.settimeout(5); sys.exit(0 if s.connect_ex((socket.gethostname(),8080))==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - traffic_rennes_net

  spark-worker:
    container_name: spark-worker
    image: apache/spark:3.5.0
    restart: unless-stopped
    command: ["/opt/spark/bin/spark-class", "org.apache.spark.deploy.worker.Worker", "spark://spark-master:7077"]
    depends_on:
      spark-master:
        condition: service_healthy
    environment:
      - SPARK_WORKER_CORES=4
      - SPARK_WORKER_MEMORY=2g
      - SPARK_WORKER_PORT=8881
      - SPARK_WORKER_WEBUI_PORT=8081
      - SPARK_LOCAL_IP=spark-worker
      - SPARK_MASTER=spark://spark-master:7077
      - SPARK_WORKER_OPTS=-Dspark.ui.bindAddress=0.0.0.0
    ports:
      - "8081:8081"
    volumes:
      - ./datalake:/opt/spark/datalake
    healthcheck:
      test: ["CMD", "python3", "-c", "import socket,sys; s=socket.socket(); s.settimeout(5); sys.exit(0 if s.connect_ex((socket.gethostname(),8081))==0 else 1)"]
      interval: 20s
      timeout: 10s
      retries: 8
      start_period: 40s
    networks:
      - traffic_rennes_net
    
  spark-submit:
    container_name: spark-submit
    image: apache/spark:3.5.0
    restart: "unless-stopped"
    user: root
    command: ["/opt/spark/bin/spark-submit", "--master", "spark://spark-master:7077", "--conf", "spark.jars.ivy=/tmp/.ivy2", "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,com.datastax.spark:spark-cassandra-connector_2.12:3.4.0", "/opt/spark/app/streaming_layer.py"]
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    volumes:
      - ./datalake:/opt/spark/datalake
      - ./spark/app:/opt/spark/app
    networks:
      - traffic_rennes_net

  spark-batch:
    container_name: spark-batch
    image: apache/spark:3.5.0
    restart: "unless-stopped"
    user: root
    command: ["/opt/spark/bin/spark-submit", "--master", "spark://spark-master:7077", "--conf", "spark.jars.ivy=/tmp/.ivy2", "--packages", "org.apache.spark:spark-sql-kafka-0-10_2.12:3.5.0,com.datastax.spark:spark-cassandra-connector_2.12:3.4.0", "/opt/spark/app/batch_layer.py"]
    depends_on:
      spark-master:
        condition: service_healthy
      kafka:
        condition: service_healthy
      cassandra:
        condition: service_healthy
      cassandra-init:
        condition: service_completed_successfully
    volumes:
      - ./datalake:/opt/spark/datalake
      - ./spark/app:/opt/spark/app
    networks:
      - traffic_rennes_net

  cassandra:
    container_name: cassandra
    image: cassandra:4.0
    restart: unless-stopped
    environment:
      MAX_HEAP_SIZE: 512M
      HEAP_NEWSIZE: 100M
      CASSANDRA_CLUSTER_NAME: TrafficRennesCluster
      CASSANDRA_DC: datacenter1
      CASSANDRA_RACK: rack1
    ports:
      - "9042:9042"
    volumes:
      - cassandra-data:/var/lib/cassandra
    healthcheck:
      test: ["CMD-SHELL", "nodetool status || exit 1"]
      interval: 30s
      timeout: 15s
      retries: 10
      start_period: 60s
    networks:
      - traffic_rennes_net

  cassandra-init:
    container_name: cassandra-init
    image: cassandra:4.0
    restart: "no"
    depends_on:
      cassandra:
        condition: service_healthy
    volumes:
      - ./cassandra/init.cql:/init.cql
    command: ["cqlsh", "cassandra", "-f", "/init.cql"]
    networks:
      - traffic_rennes_net

  grafana:
    container_name: grafana
    image: grafana/grafana:latest
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: "admin"
    ports:
      - "3000:3000"
    volumes:
      - ./grafana:/var/lib/grafana
    networks:
      - traffic_rennes_net

volumes:
  kafka-data:
  cassandra-data:

networks:
  traffic_rennes_net:
    name: traffic_rennes_net
    driver: bridge